metadata:
  version: "1.0.0"
  created: "2026-02-22T00:00:00Z"
  last_modified: "2026-02-22"
  last_verified: "2026-02-22"
  verification_status: "verified"

  quality_attributes:
    concurrent_users: "Single developer per terminal session; no concurrency requirements"
    response_time: "Under 2 seconds for all commands in a typical workspace"
    data_durability: "Workspace and project config files must never be silently corrupted; partial writes must be avoided"
    maintainers: "TypeScript engineers familiar with Node.js CLI tooling"
    change_frequency: "New tools and scaffold templates added frequently; core command contracts change rarely"

  technical_constraints:
    platform: "CLI"
    technology_mandates:
      - "Node.js 24+"
      - "TypeScript 5"
      - "pnpm 10"
      - "meow (CLI argument parsing)"
      - "ink + React 18 (terminal UI rendering)"
      - "Handlebars (scaffold template rendering)"
      - "Zod (config schema validation)"
      - "yaml (YAML parsing and serialization)"
      - "fs-extra (file system operations)"
      - "tsup (build bundler)"
      - "vitest (test runner)"
    integrations:
      - "moonrepo (workspace task runner target; workspace config at .moon/workspace.yml; inherited tasks at .moon/tasks/<filename>.yml under the tasks: key)"
      - "prototools (runtime version pin target; .prototools at workspace root in TOML key=value format)"
      - "VSCode (.vscode/settings.json at workspace root)"
      - "Claude (.claude/settings.json at workspace root; hooks array merged by matcher + hooks array content)"
    regulations: []
    timeline: ""
    team_expertise: "TypeScript, Node.js, monorepo tooling (moonrepo, pnpm workspaces)"

  uncertainty_log:
    - item: "Web UI graph for aikuora info command"
      context: >
        The future vision for aikuora info includes a web-based graph
        visualization of workspace structure and tool relationships. This is
        not a current behavior and has no defined requirements yet.
      status: "deferred"
    - item: "Post-scaffold explicit tool addition to existing projects (direct developer invocation of link mode — aikuora add <tool> <target>)"
      context: >
        In v1, ADD-002 (link mode) is triggered only automatically by ADD-001
        (scaffold) when processing devtools entries. Direct developer invocation
        of link mode after a project already exists is not implemented. This
        is deferred to a future version. Any attempt by a developer to run
        aikuora add <tool> <target> directly should be handled when this
        feature is implemented.
      status: "deferred"
    - item: "Direct package dependency wiring (aikuora add <pkg> <target>) — developer-invoked ADD-006"
      context: >
        In v1, ADD-006 (project dependency mode) is triggered only automatically
        by ADD-001 (scaffold) when processing packages entries. Direct developer
        invocation of aikuora add <pkg> <target> to wire a shared_config_package
        dependency into an existing project is not implemented in v1. This is
        deferred to a future version.
      status: "deferred"
