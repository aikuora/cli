          `existsSync(p) ? JSON.parse(readFileSync(p, 'utf-8')) as T : {}` appears
          five times: patchTsconfigPaths, patchTsconfigReferences, ensureRootPeerDeps,
          mergeJsonFile, and ensureConfigsEntry. Extract a typed helper
          `function readJsonFile<T extends Record<string, unknown>>(p: string): T`
          into src/utils/json-file.ts (or as a private top-level function in add.tsx).
          Replace all five call-sites. No behavior change.
        files:
          - "src/commands/add.tsx"

      - id: P0-02
        title: "Extract loadResolvedTool helper to eliminate tool-resolution boilerplate"
        spec_ref: null
        status: completed
        note: >
          In src/commands/add.tsx the triplet
          scanAllTools -> resolveTool -> loadToolConfig with three separate error
          checks is copy-pasted identically in runRoot, runScaffold, runShareable,
          and runLink (four copies). Extract a private helper
          `async function loadResolvedTool(toolName, projectRoot, customPaths, json, mode, silent?)`
          that returns `{ success: false } | { success: true, discovered, toolConfig, tools }`.
          Replace all four call-sites. No behavior change.
        files:
          - "src/commands/add.tsx"

      - id: P0-03
        title: "Move mid-file import statements to top of add.tsx"
        spec_ref: null
        status: completed
        note: >
          In src/commands/add.tsx, `import type { Config }` (line 544) and
          `import type { WorkspaceConfig }` (line 545) appear in the middle of the
          file, between function bodies. ESM convention and the project's import
          ordering rule require all imports at the top. Move both imports to the
          import block at lines 1-21. No behavior change.
        files:
          - "src/commands/add.tsx"

      - id: P0-04
        title: "Fix scanCustomTools — use basename instead of dirname for tool name"
        spec_ref: null
        status: completed
        note: >
          In src/core/scanner.ts line 106, scanCustomTools() derives the tool name
          with `dirname(absolutePath).split('/').pop()`. dirname('/path/to/mytool')
          returns '/path/to', whose last segment is 'to', not 'mytool'. The correct
          fix is `basename(absolutePath)`, which is already imported on line 2.
          Remove the .split('/').pop() chain and replace with a single basename call.
          Note: basename is already imported. This is a pure simplification — the
          bug fix itself is tracked in P2-03 (spec alignment phase); this task
          covers the readability/correctness improvement independently.
        files:
          - "src/core/scanner.ts"

      - id: P0-05
        title: "Eliminate duplicate readConfig call in addCommand dispatcher"
        spec_ref: null
        status: completed
        note: >
          In src/commands/add.tsx, addCommand() calls readConfig() twice: once at
          line 1105 for the `if (target)` branch, and again at line 1127 for the
          'no target, no name' branch. Hoist a single readConfig() call to the top
          of addCommand (after the early returns for local/name), then pass the
          already-read config into both branches. For the `if (target)` branch,
          pass the customPaths from the hoisted result; for the 'bare add' branch,
          reuse the already-read allTools. No behavior change.
        files:
          - "src/commands/add.tsx"

      - id: P0-06
        title: "Extract MoonTaskEntry builder to eliminate task-building duplication in moon.ts"
        spec_ref: null
        status: completed
        note: >
          In src/utils/moon.ts the same task-to-entry conversion is copy-pasted in
          three places: buildMoonConfig (lines 31-35), addMoonTask (lines 76-80),
          and addInheritedMoonTasks (lines 166-170). Extract a private helper
          `function taskToEntry(task: MoonTask): MoonTaskEntry` that builds the
          MoonTaskEntry object from a MoonTask, including conditional assignment
          of args, inputs, outputs, and options. Replace all three call-sites.
          No behavior change.
        files:
          - "src/utils/moon.ts"

      - id: P0-07
        title: "Fix getTemplatesPath to use same two-level detection as getBuiltInToolsPath"
        spec_ref: null
        status: completed
        note: >
          In src/utils/template.ts, getTemplatesPath() resolves the CLI root with
          `resolve(dirname(currentFilePath), '../')` — one level up. In the bundled
          output (dist/index.js) the file is one level below the CLI root, so this
          works. But in dev/test (src/utils/template.ts) the file is two levels
          below the CLI root, so the path is wrong. The correct implementation
          mirrors getBuiltInToolsPath in src/core/scanner.ts: check whether
          basename(dirname(currentFilePath)) === 'dist' and go one or two levels up
          accordingly. Update getTemplatesPath to use this check. No behavior change
          in production; fixes dev/test path resolution.
        files:
          - "src/utils/template.ts"
          - "src/core/scanner.ts"

      - id: P0-08
        title: "Remove dead customizable check documentation inconsistency in runLocal"
        spec_ref: null
        status: completed
        note: >
          In src/commands/add.tsx, runLocal() checks `toolConfig.customizable`
          (line 967) and returns an error if false. The AddOptions interface JSDoc
          says `--local` is for forking built-in tools with no mention of
          customizable. The toolConfigSchema still declares customizable as a field
          (default false), making every built-in tool reject --local unless the
          field is explicitly set. While full removal of the customizable gate is
          tracked in P2-04 (spec alignment), this task: (1) adds a TODO comment
          on the customizable check citing P2-04, (2) updates the AddOptions JSDoc
          to accurately reflect current behavior, and (3) removes the `local` mode
          label from AddCommand props that incorrectly says 'install' as fallback
          for the 'bare add' case (line 148 in index.tsx). No behavior change.
        files:
          - "src/commands/add.tsx"
          - "src/index.tsx"

