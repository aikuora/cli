name: eslint
description: "ESLint flat config with TypeScript support"
kind: shareable
lang: typescript
requires:
  - pnpm

workspace:
  vscode:
    extensions:
      - "dbaeumer.vscode-eslint"
    settings:
      eslint.enable: true
      eslint.format.enable: true
      eslint.experimental.useFlatConfig: true
      editor.codeActionsOnSave:
        source.fixAll.eslint: "explicit"
  claude:
    hooks:
      PostToolUse:
        - matcher: Write|Edit
          hooks:
            - type: command
              command: |
                FILE=$(cat | jq -r '.tool_input.file_path // empty')
                [[ "$FILE" =~ \.(js|jsx|ts|tsx)$ ]] && pnpm exec eslint --fix "$FILE" || true
  moon:
    file: typescript
    fileGroups:
      sources:
        - 'src/**/*.ts'
        - 'src/**/*.tsx'
        - 'src/**/*.js'
        - 'src/**/*.jsx'
      tests:
        - 'src/**/*.test.ts'
        - 'src/**/*.test.tsx'
        - 'src/**/*.spec.ts'
        - 'src/**/*.spec.tsx'
        - 'tests/**/*.ts'
        - 'tests/**/*.tsx'
      configs:
        - 'eslint.config.mjs'
        - '*.config.ts'
        - '*.config.mjs'
    tasks:
      - name: lint
        command: eslint
        args: ['.']
        inputs:
          - '@group(sources)'
          - '@group(tests)'
          - '@group(configs)'
        options:
          cache: true
      - name: lint-fix
        command: eslint
        args: ['.', '--fix']
        options:
          cache: false

link:
  dependency: true
  targetFile: eslint.config.mjs
  content: "export { default } from '{{packageName}}/{{variant}}';\n"
  variants:
    - name: typescript
      default: true
    - name: nextjs
      forTools:
        - nextjs
