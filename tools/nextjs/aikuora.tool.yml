name: nextjs
kind: none
lang: typescript

scaffold:
  type: app
  cssEntry: src/app/globals.css
  devtools:
    - prettier
    - tailwind
    - tool: eslint
      variant: nextjs
    - tool: tsconfig
      variant: nextjs
  packages:
    - ui
  moonTasks:
    - name: dev
      command: next dev
    - name: build
      command: next build
    - name: start
      command: next start
