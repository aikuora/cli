name: prettier
kind: shareable
lang: typescript
requires:
  - pnpm

workspace:
  vscode:
    extensions:
      - "esbenp.prettier-vscode"
    settings:
      editor.formatOnSave: true
      "[typescript]":
        editor.defaultFormatter: "esbenp.prettier-vscode"
      "[typescriptreact]":
        editor.defaultFormatter: "esbenp.prettier-vscode"
      "[markdown]":
        editor.defaultFormatter: "esbenp.prettier-vscode"
      "[json]":
        editor.defaultFormatter: "esbenp.prettier-vscode"
  claude:
    hooks:
      PostFileWrite:
        - matcher: "*.{js,jsx,ts,tsx,mjs,cjs,json,md,css,scss,yaml,yml}"
          command: 'pnpm exec prettier --write "$FILE"'
  moon:
    file: typescript
    tasks:
      - name: format
        command: prettier
        args: ['--write', '.']
        options:
          cache: false
      - name: format-check
        command: prettier
        args: ['--check', '.']

link:
  dependency: true
  targetFile: prettier.config.mjs
  content: "export { default } from '{{packageName}}';\n"
