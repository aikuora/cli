name: prettier
kind: shareable
lang: typescript
requires:
  - pnpm

workspace:
  vscode:
    extensions:
      - "esbenp.prettier-vscode"
    settings:
      editor.formatOnSave: true
      "[typescript]":
        editor.defaultFormatter: "esbenp.prettier-vscode"
      "[typescriptreact]":
        editor.defaultFormatter: "esbenp.prettier-vscode"
      "[markdown]":
        editor.defaultFormatter: "esbenp.prettier-vscode"
      "[json]":
        editor.defaultFormatter: "esbenp.prettier-vscode"
  claude:
    hooks:
      PostToolUse:
        - matcher: Write|Edit
          hooks:
            - type: command
              command: |
                FILE=$(cat | jq -r '.tool_input.file_path // empty')
                [[ "$FILE" =~ \.(js|jsx|ts|tsx|mjs|cjs|json|md|css|scss|yaml|yml)$ ]] && pnpm exec prettier --write "$FILE" || true
  moon:
    file: typescript
    fileGroups:
      sources:
        - 'src/**/*.ts'
        - 'src/**/*.tsx'
        - 'src/**/*.js'
        - 'src/**/*.jsx'
      tests:
        - 'src/**/*.test.ts'
        - 'src/**/*.test.tsx'
        - 'src/**/*.spec.ts'
        - 'src/**/*.spec.tsx'
        - 'tests/**/*.ts'
        - 'tests/**/*.tsx'
      configs:
        - '*.config.ts'
        - '*.config.mjs'
        - '*.json'
        - '*.md'
        - '*.css'
        - '*.yaml'
        - '*.yml'
    tasks:
      - name: format
        command: prettier
        args: ['--write', '.']
        options:
          cache: false
      - name: format-check
        command: prettier
        args: ['--check', '.']
        inputs:
          - '@group(sources)'
          - '@group(tests)'
          - '@group(configs)'

link:
  dependency: true
  targetFile: prettier.config.mjs
  content: "export { default } from '{{packageName}}';\n"
