name: tsup
description: "tsup bundler and build configuration"
kind: shareable
lang: typescript
requires:
  - pnpm

workspace:
  moon:
    file: typescript
    fileGroups:
      sources:
        - "src/**/*.ts"
        - "src/**/*.tsx"
    tasks:
      - name: build
        command: tsup
        inputs:
          - "@group(sources)"
        outputs:
          - "dist"
        options:
          cache: true
  gitignore:
    - dist
    - build
    - out

link:
  dependency: true
  targetFile: tsup.config.ts
  content: "export { default } from '{{packageName}}/{{variant}}';\n"
  variants:
    - name: library
      default: true
    - name: cli
    - name: react
    - name: dual
