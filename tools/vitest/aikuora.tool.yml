name: vitest
kind: shareable
lang: typescript
requires:
  - pnpm

workspace:
  vscode:
    extensions:
      - "vitest.explorer"
  moon:
    file: typescript
    fileGroups:
      sources:
        - 'src/**/*.ts'
        - 'src/**/*.tsx'
        - 'src/**/*.js'
        - 'src/**/*.jsx'
      tests:
        - 'src/**/*.test.ts'
        - 'src/**/*.test.tsx'
        - 'src/**/*.spec.ts'
        - 'src/**/*.spec.tsx'
        - 'tests/**/*.ts'
        - 'tests/**/*.tsx'
    tasks:
      - name: test
        command: vitest
        args: ['run']
        inputs:
          - '@group(sources)'
          - '@group(tests)'
        options:
          cache: false
      - name: test-watch
        command: vitest
        args: ['watch']
        options:
          cache: false
  gitignore:
    - coverage

link:
  dependency: true
  targetFile: vitest.config.ts
  content: "export { default } from '{{packageName}}';\n"
